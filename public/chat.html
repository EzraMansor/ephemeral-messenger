<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Ephemeral Messenger</title>
    <link rel="stylesheet" href="chat.css">
</head>
<body>

  <main id="app-container">
    <div id="rooms-sidebar">
      <h2>Active Rooms</h2>
      <div class='room' id="addroom">+ Add New Room</div>
    </div>

    <div id="chat-section">
      <div class="chat-titlebar">Current Room Name</div>
      <div class="chat-messages"></div>
      <div class="chat-input">
          <input type="text" placeholder="Type a message...">
          <button>Send</button>
      </div>
    </div>

    <div id="members-sidebar">
      <h2>Active Members</h2>
      <div class="member" id="adduser">+ Add User</div>
    </div>
  </main>

  <footer class="source-footer">
    <p>This program is free software under the AGPL-3.0. 
      <a href="https://github.com/EzraMansor/ephemeral-messenger" target="_blank" rel="noopener noreferrer">View Source Code</a>
    </p>
  </footer>

  <script type="module" src="./js/main.js"></script>
</body>
</html>
